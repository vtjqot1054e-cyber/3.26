<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本地提词器</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0a0a0a; color: #f2f2f2; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; overflow: hidden; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px 16px;
      padding: 10px 14px; background: rgba(20,20,20,.92); border-bottom: 1px solid #333;
      font-size: 13px;
    }
    #toolbar label { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    #toolbar input[type="range"] { width: 100px; vertical-align: middle; }
    #toolbar button {
      padding: 6px 12px; border: 1px solid #555; background: #2a2a2a; color: #eee;
      border-radius: 6px; cursor: pointer;
    }
    #toolbar button:hover { background: #3a3a3a; }
    #toolbar .hint { color: #888; font-size: 12px; }
    #stage-wrap {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    #stage {
      position: absolute; left: 50%; top: 0; transform: translateX(-50%);
      width: min(92vw, 720px); padding: 45vh 24px 120vh;
      font-size: var(--fs, 42px); line-height: 1.55; text-align: center;
      will-change: transform;
    }
    #stage.mirror { transform: translateX(-50%) scaleX(-1); }
    #stage p { margin: 0 0 1.1em; }
    #overlay-hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #555; font-size: 12px; pointer-events: none;
    }
    body.focus-mode #toolbar { opacity: 0; pointer-events: none; transition: opacity .25s; }
    body.focus-mode #toolbar:hover { opacity: 1; pointer-events: auto; }
    body.focus-mode #overlay-hint { opacity: 0; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>载入稿子 <input type="file" id="file" accept=".md,.txt,text/markdown,text/plain" /></label>
    <button type="button" id="btnPaste">从剪贴板粘贴</button>
    <button type="button" id="btnPlay">播放 / 暂停</button>
    <label>速度 <input type="range" id="speed" min="8" max="120" value="32" /></label>
    <label>字号 <input type="range" id="fontsize" min="28" max="72" value="42" /></label>
    <label><input type="checkbox" id="mirror" /> 镜像（硬件提词器）</label>
    <label><input type="checkbox" id="focus" /> 沉浸（顶栏悬停显示）</label>
    <span class="hint">空格：暂停 · ↑↓：调速 · F11：浏览器全屏</span>
  </div>
  <div id="stage-wrap">
    <div id="stage"></div>
  </div>
  <div id="overlay-hint">已内嵌默认稿；可用「载入稿子」覆盖</div>

  <!-- 与 yangh.md 同步：改 md 后把全文粘贴替换下面整块，或直接用「载入稿子」选 yangh.md -->
  <script type="text/plain" id="default-md">
感谢各位领导！兰心刚才介绍了我们团队的能力和体系，我补充几点。
第一，医促会的项目在我们公司是战略级优先。只要是医促会的项目，核心团队全员到位，公司资源优先调配，这一点我在这里给各位领导一个明确的承诺。

第二，我们和医促会已经有了很好的合作基础。** 华西梅奥国际重症医学大会、华西国际骨科论坛、国家口腔医学中心年会这些项目我们都全程参与服务，我们很了解医促会的标准和要求，也深刻理解学会运作的特殊性。合作起来不需要磨合，直接上手。

第三，在流程和规范上我也想给各位吃颗定心丸。** 学会办会有自己的制度和要求，我们作为服务方，会严格按医促会的标准和流程来走——从策划、执行到收尾，环节清晰、资料留痕；需要配合审计、报备、财务对账的，我们积极配合、随时响应。

第四，我们特别希望和医促会建立长期、稳定的合作关系。** 从学术策划、视觉设计、宣传传播到现场执行，我们是一条龙团队，按学会的统一节奏来配合；该对齐的对齐、该留痕的留痕，把每一届会办利索。我们很愿意做医促会信得过的长期伙伴，一起把品牌会议做好。
 感谢各位领导，期待合作！如果有任何问题，我们随时解答。



金马那边我已经好几年没有参与经营管理了，具体情况我确实不太了解。我这几年全部精力投在易勤这支团队上。我的判断是，医促会要做的是自己的品牌会议，和传统学会项目的定位完全不一样——品牌会议要求专、精、合规，要有完整的学术策划和宣传体系。这恰恰是我们易勤这几年一直在深耕的方向。

兰心跟了我7年，我们的核心团队——运营策划、接待、会场管理、设计、宣传——都是长期磨合的熟手。和医促会合作的项目，从人到资源到管理，全部是这支团队负责，我亲自盯。"
坦诚的说确实经历过。这个行业这几年都不容易，人来人走很正常。
但我想说的是结果——留下来的人，才是真正经过筛选的。我们核心团队的平均在职时间超过5年，最长的超过13年。这些人不是没有别的选择，是选择留下来一起做这件事。
我现在的想法很简单：不追求人多，追求稳和专。团队精干、分工明确、配合默契——这比人多管不住要靠谱得多。各位领导看我们的材料，12个核心成员的在职年限和履历都在里面，这个稳定性我们经得起看。
  </script>

  <script>
    const stage = document.getElementById('stage');
    const fileInput = document.getElementById('file');
    const speedEl = document.getElementById('speed');
    const fontEl = document.getElementById('fontsize');
    const mirrorEl = document.getElementById('mirror');
    const focusEl = document.getElementById('focus');
    let playing = true;
    let y = 0;
    let last = performance.now();

    function mdToPlain(s) {
      return s
        .replace(/\*\*/g, '')
        .replace(/\r\n/g, '\n')
        .trim();
    }

    function render(text) {
      const plain = mdToPlain(text);
      const paras = plain.split(/\n\n+/).map(p => p.replace(/\n/g, '<br/>'));
      stage.innerHTML = paras.filter(Boolean).map(p => '<p>' + p + '</p>').join('');
      y = 0;
      stage.style.transform = mirrorEl.checked
        ? 'translateX(-50%) translateY(0) scaleX(-1)'
        : 'translateX(-50%) translateY(0)';
      document.getElementById('overlay-hint').style.display = plain ? 'none' : 'block';
    }

    function applyFont() {
      document.documentElement.style.setProperty('--fs', fontEl.value + 'px');
    }

    function tick(now) {
      const dt = (now - last) / 1000;
      last = now;
      if (playing) {
        y -= Number(speedEl.value) * dt;
        const maxUp = stage.offsetHeight - window.innerHeight + 100;
        if (y < -maxUp) y = -maxUp;
        if (y > 0) y = 0;
        const mx = mirrorEl.checked ? 'translateX(-50%) scaleX(-1)' : 'translateX(-50%)';
        stage.style.transform = mx + ' translateY(' + y + 'px)';
      }
      requestAnimationFrame(tick);
    }

    fileInput.addEventListener('change', async () => {
      const f = fileInput.files[0];
      if (!f) return;
      const t = await f.text();
      render(t);
    });

    document.getElementById('btnPaste').addEventListener('click', async () => {
      try {
        const t = await navigator.clipboard.readText();
        render(t);
      } catch {
        alert('无法读取剪贴板，请手动全选稿子复制后再点一次，或改用「载入稿子」选 .md 文件。');
      }
    });

    document.getElementById('btnPlay').addEventListener('click', () => {
      playing = !playing;
      last = performance.now();
    });

    mirrorEl.addEventListener('change', () => {
      stage.classList.toggle('mirror', mirrorEl.checked);
    });

    focusEl.addEventListener('change', () => {
      document.body.classList.toggle('focus-mode', focusEl.checked);
    });

    fontEl.addEventListener('input', applyFont);
    applyFont();

    const defaultMd = document.getElementById('default-md');
    if (defaultMd && defaultMd.textContent.trim()) {
      render(defaultMd.textContent);
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        playing = !playing;
        last = performance.now();
      }
      if (e.code === 'ArrowUp') {
        speedEl.value = Math.min(120, Number(speedEl.value) + 4);
      }
      if (e.code === 'ArrowDown') {
        speedEl.value = Math.max(8, Number(speedEl.value) - 4);
      }
    });

    requestAnimationFrame(tick);
  </script>
</body>
</html>
